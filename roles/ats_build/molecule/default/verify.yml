---
- name: Start and Verify ATS will run.
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify apache server base binary
      command:
        cmd: /opt/ats/bin/traffic_server --version
      changed_when: false

    - name:  Can start service
      command:
        cmd: /opt/ats/bin/trafficserver start
      changed_when: false

    - name: Wait for port 8080
      wait_for:
        port: 8080
        host: 127.0.0.1
        timeout: 5
      connection: local

    - name:  Can stop service
      command:
        cmd: /opt/ats/bin/trafficserver stop
      changed_when: false