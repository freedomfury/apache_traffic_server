ats_core_remap_config:
  - type: include
    files: [filters.config]

  - type: include
    files: [top.config, buttom.config]

  - type: map
    target: http://www.x.com/
    replace: http://server.hoster.com/
    acls:
      action: deny
      src_ip: 10.5.2.1
    plugins:
      - path: /etc/traffic_server/config/plugins/plugin1.so
        param: 1
        params: 2

  - type: map_with_referer
    client_url: http://y.foo.bar.com/x/yy/ 
    origin_server_url: http://foo.bar.com/x/yy/
    redirect_url: http://foo.bar.com/x/yy/
    regexes: ['.*\.bar\.com', 'www.bar-friends.com']

  - type: activatefilter
    name: deny_purge

  - type: definefilter
    name: deny_purge
    action: deny
    method: purge

ats_core_remap_includes:
  filters:
  - type: activatefilter
    name: deny_purge

  - type: definefilter
    name: deny_purge
    action: deny
    method: purge
