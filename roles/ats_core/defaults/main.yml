---
ats_core_home: /opt/ats
ats_core_conf_inc_dir: "{{ ats_core_home }}/etc/trafficserver/conf.d"
ats_core_service_enabled: true
ats_core_manage_config: true
ats_core_purge_inc_dir: true
ats_core_service_state: started
ats_core_source_archive: files/ats-artifact-9.1.1.tar.gz
ats_core_cache_config:
  - dest_domain: mydomain.com
    suffix: gif
    revalidate: 6h

ats_core_splitdns_config:
  - dest_domain: internal.company.com
    named: 255.255.255.255:212 255.255.255.254
    def_domain: company.com
    search_list: company.com company1.com

ats_core_plugin_config:
  - name: plugins/abuse/abuse.so
    args: [etc/trafficserver/abuse.config]

