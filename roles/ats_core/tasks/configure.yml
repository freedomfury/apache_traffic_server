  when: (ats_core_volume_config | default(false))

- name: Load remap.config and remap includes
  block:
  - name: Manage remap.config file
    template:
      src: templates/remap.config.j2
      dest: /tmp/remap.config
      mode: 0644
      owner: root
      group: root
    vars:
      ats_core_remap_generic: "{{ ats_core_remap_config }}"

  - name: Get includes from configuration
    set_fact:
      ats_core_remap_include_files: "{{ ats_core_remap_config | json_query(ats_core_remap_includes_query) }}"
    vars:
      ats_core_remap_includes_query: "[?type=='include'].files[]"

  - name: Configure conf.d
    include_tasks: includes.yml
    when: (ats_core_remap_include_files) 
  when: (ats_core_remap_config | default(false))
