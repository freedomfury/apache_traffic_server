---
- name: Manage cache.config file
  template:
    src: templates/generic.config.j2
    dest: /tmp/cache.config
    mode: 0644
    owner: root
    group: root
  vars:
    ats_core_generic_config: "{{ ats_core_cache_config }}"
  when: (ats_core_cache_config | default(false))

